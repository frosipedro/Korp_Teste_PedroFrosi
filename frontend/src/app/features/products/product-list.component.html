<div class="page-header">
  <h1>Produtos</h1>
  <a mat-raised-button color="primary" routerLink="/products/new">
    <mat-icon>add</mat-icon>
    Novo Produto
  </a>
</div>

<div class="list-toolbar">
  <div class="list-toolbar__controls">
    <mat-form-field appearance="outline" class="sort-field">
      <mat-label>Ordenar por</mat-label>
      <mat-select
        [value]="sortField"
        (selectionChange)="setSortField($event.value)"
      >
        <mat-option *ngFor="let option of sortOptions" [value]="option.value">
          {{ option.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-button-toggle-group
      class="sort-direction-toggle"
      [value]="sortDirection"
      (change)="setSortDirection($event.value)"
      aria-label="Direção da ordenação"
    >
      <mat-button-toggle value="asc">Crescente</mat-button-toggle>
      <mat-button-toggle value="desc">Decrescente</mat-button-toggle>
    </mat-button-toggle-group>
  </div>
</div>

<div
  *ngIf="loadError"
  class="feedback-banner feedback-banner--error"
  role="alert"
  aria-live="assertive"
>
  <mat-icon>cloud_off</mat-icon>
  <div class="feedback-banner__content">
    <span class="feedback-banner__title">Serviço indisponível</span>
    <p class="feedback-banner__message">{{ loadError }}</p>
    <small *ngIf="retryInSeconds !== null"
      >Nova tentativa automática em {{ retryInSeconds }}s.</small
    >
    <div class="feedback-banner__actions">
      <button mat-stroked-button color="warn" (click)="retryNow()">
        Tentar agora
      </button>
    </div>
  </div>
</div>

<div *ngIf="loading$ | async" class="spinner-container">
  <mat-spinner diameter="40" />
</div>

<div class="table-shell" *ngIf="!(loading$ | async) && !loadError">
  <table
    mat-table
    [dataSource]="sortedProducts"
    class="mat-elevation-z2 full-width data-table data-table--products"
  >
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Código</th>
      <td mat-cell *matCellDef="let p">{{ p.code }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Descrição</th>
      <td mat-cell *matCellDef="let p">{{ p.description }}</td>
    </ng-container>

    <ng-container matColumnDef="balance">
      <th mat-header-cell *matHeaderCellDef>Saldo</th>
      <td mat-cell *matCellDef="let p">
        <mat-chip [color]="p.balance > 0 ? 'primary' : 'warn'" highlighted>
          {{ p.balance }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let p">
        <a
          mat-icon-button
          [routerLink]="['/products/edit', p.id]"
          matTooltip="Editar"
        >
          <mat-icon>edit</mat-icon>
        </a>
        <button
          mat-icon-button
          color="warn"
          (click)="delete(p.id)"
          matTooltip="Excluir"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-row" colspan="4">Nenhum produto cadastrado.</td>
    </tr>
  </table>
</div>
