upstream inventory_service {
    server inventory:8081;
    keepalive 16;
}

upstream billing_service {
    server billing:8082;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular routing — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inventory service
    location /api/inventory/ {
        proxy_pass         http://inventory_service/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_intercept_errors on;
        error_page 502 504 = @inventory_unavailable;
    }

    # Proxy billing service
    location /api/billing/ {
        proxy_pass         http://billing_service/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_intercept_errors on;
        error_page 502 504 = @billing_unavailable;
    }

    location @inventory_unavailable {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 503 '{"error":"upstream inventory unavailable","code":"INVENTORY_UNAVAILABLE","message":"O servico de estoque esta temporariamente indisponivel. Tente novamente em instantes.","service":"inventory","retryable":true}';
    }

    location @billing_unavailable {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 503 '{"error":"upstream billing unavailable","code":"BILLING_UNAVAILABLE","message":"O servico de faturamento esta temporariamente indisponivel. Tente novamente em instantes.","service":"billing","retryable":true}';
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}